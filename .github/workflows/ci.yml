name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  cs:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHP_CodeSniffer
        run: vendor/bin/phpcs

  stan:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --error-format=github

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer
          coverage: xdebug

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - run: mkdir -p .phpunit.cache

      - name: Run PHPUnit (console)
        run: vendor/bin/phpunit --configuration phpunit.xml.dist --colors=always

      - name: Generate coverage summary
        run: |
          echo '```' > .phpunit.cache/coverage.txt
          vendor/bin/phpunit \
            --configuration phpunit.xml.dist \
            --colors=never \
            --coverage-text >> .phpunit.cache/coverage.txt
          echo '```' >> .phpunit.cache/coverage.txt

      - name: Report test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '.phpunit.cache/junit.xml'
          check_name: 'PHPUnit Test Results'

      - name: Post coverage summary
        uses: marocchino/sticky-pull-request-comment@v3
        if: github.event_name == 'pull_request'
        with:
          header: coverage
          path: .phpunit.cache/coverage.txt

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: |
            .phpunit.cache/coverage-html
            .phpunit.cache/coverage.xml
            .phpunit.cache/junit.xml
          retention-days: 7
